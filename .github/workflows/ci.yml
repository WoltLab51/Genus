name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Run pytest
        env:
          # Dummy keys so modules that read env vars at import time don't crash.
          # No real LLM or external service is contacted during unit tests.
          GENUS_API_KEY: ci-test-key
          GENUS_MASTER_KEY: ci-master-key
          GENUS_LLM_OLLAMA_URL: http://localhost:11434
          GENUS_LLM_OLLAMA_MODEL: llama3.2
        run: |
          pytest tests/unit/ \
            --tb=short \
            -q \
            --asyncio-mode=auto

  lint:
    name: Import check (no syntax errors)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Check main entry point imports cleanly
        env:
          GENUS_API_KEY: ci-test-key
          GENUS_MASTER_KEY: ci-master-key
        run: |
          python -c "from genus.api.app import create_app; app = create_app(api_key='ci-test-key'); print('✅ create_app() OK')"
